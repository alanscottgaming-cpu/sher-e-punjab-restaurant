<!DOCTYPE html>
<html>
<head>
<title>Sher-E-Punjab Restaurant</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

/* HERO SECTION */

.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1604908176997-125f25cc6f3d') center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
color:#ffd700;
}

.hero p{
font-size:24px;
margin-bottom:20px;
}

.btn{
padding:15px 30px;
margin:10px;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

.call{
background:#c0392b;
color:white;
}

.mapbtn{
background:#27ae60;
color:white;
}

/* MENU SECTION */

.menu{
padding:60px 20px;
background:#111;
text-align:center;
}

.menu h2{
font-size:40px;
color:#ffd700;
margin-bottom:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:10px;
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
color:#ffd700;
}

/* MAP */

.map{
padding:60px;
text-align:center;
background:#000;
}

iframe{
width:100%;
height:400px;
border:0;
}

/* FOOTER */

footer{
background:#111;
padding:20px;
text-align:center;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-size:18px;
}

</style>
</head>

<body>

<!-- HERO -->

<div class="hero">

<h1>SHER-E-PUNJAB</h1>

<p>Authentic Punjabi Taste</p>

<button class="btn call">Call Now</button>

<button class="btn mapbtn">Get Directions</button>

</div>

<!-- MENU -->

<section class="menu">

<h2>Punjabi Feast</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1604909052743-94e838986d24">
<h3>Tandoori Starters</h3>
<p>Chicken Tikka<br>Tandoori Paneer</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1631452180519-c014fe946bc7">
<h3>Punjabi Non-Veg</h3>
<p>Butter Chicken<br>Mutton Rogan Josh</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1601050690597-df0568f70950">
<h3>Veg Punjabi</h3>
<p>Dal Makhani<br>Paneer Butter Masala</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1633945274405-b6c8069047b0">
<h3>Biryani</h3>
<p>Chicken Biryani<br>Paneer Biryani</p>
</div>

</div>

</section>

<!-- MAP -->

<section class="map">

<h2>Visit Our Dhaba</h2>

<iframe src="https://maps.google.com/maps?q=punjab%20restaurant&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>

<br><br>

<button class="btn call">Call Now</button>

<button class="btn mapbtn">Get Directions</button>

</section>

<footer>

<nav>

<a href="#">Home</a>

<a href="#">Menu</a>

<a href="#">Reviews</a>

<a href="#">Contact</a>

</nav>

</footer>

</body>
</html>
